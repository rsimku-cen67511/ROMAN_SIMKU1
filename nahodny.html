<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Náhodný text</title>
  <style>
    body {
      background: #eef6ff;
      color: #003c8f;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 700px;
      border: 2px solid #4a7bd4;
      border-radius: 16px;
      background: rgba(255,255,255,0.9);
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 60, 143, 0.15);
    }
    h1 {
      margin-top: 0;
      color: #002766;
    }
    p {
      line-height: 1.8;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Náhodný text</h1>
    <p>Světélkující měsíční obloha posílá tiše modré vlny přes zelinkavé louky, kde vlaštovky tančí v lehkém vánku a čas se na chvíli zastaví.</p>
  </div>
</body>
</html>
