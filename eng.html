<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester Anglických Slovíček</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #e74c3c;
            font-size: 24px;
            font-weight: bold;
        }

        .timer {
            text-align: center;
        }

        .timer-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .timer-value {
            color: #e74c3c;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: color 0.3s;
        }

        .timer-value.warning {
            color: #ff9800;
            animation: pulse 1s infinite;
        }

        .timer-value.critical {
            color: #f44336;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            10%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .question-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid #e74c3c;
        }

        .question-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .english-word {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .czech-hidden {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .answer-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-check {
            background: #e74c3c;
            color: white;
        }

        .btn-check:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-skip {
            background: #ccc;
            color: #333;
        }

        .btn-skip:hover {
            background: #bbb;
        }

        .result {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        .result.correct {
            background: #d4edda;
            color: #155724;
            display: block;
            border: 1px solid #c3e6cb;
        }

        .result.incorrect {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border: 1px solid #f5c6cb;
        }

        .answer-display {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            color: #004085;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .answer-display.show {
            display: block;
        }

        .completed-box {
            text-align: center;
            padding: 40px 20px;
        }

        .completed-box h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .completed-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .btn-restart {
            background: #e74c3c;
            color: white;
            padding: 12px 30px;
        }

        .btn-restart:hover {
            background: #c0392b;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            width: 0%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .english-word {
                font-size: 24px;
            }

            .stats {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Tester Anglických Slovíček</h1>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Správně</div>
                <div class="stat-value" id="correctCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Zbývá</div>
                <div class="stat-value" id="remainingCount">100</div>
            </div>
            <div class="stat">
                <div class="stat-label">Skóre</div>
                <div class="stat-value" id="scoreCount">0%</div>
            </div>
            <div class="timer">
                <div class="timer-label">⏱️ Čas</div>
                <div class="timer-value" id="timerValue">3:00</div>
            </div>
        </div>

        <div id="quizContainer">
            <div class="question-box">
                <div class="question-label">Jak se českému slovu translations říká anglicky?</div>
                <div class="english-word" id="englishWord">the</div>
                <div class="czech-hidden">Přeloží anglické slovo do češtiny</div>
                <input type="text" id="answerInput" class="answer-input" placeholder="Zadej svou odpověď..." autocomplete="off">
                <div class="result" id="result"></div>
                <div class="answer-display" id="answerDisplay"></div>
            </div>

            <div class="buttons">
                <button class="btn-check" id="checkBtn">Zkontrolovat</button>
                <button class="btn-skip" id="skipBtn">Přeskočit</button>
            </div>
        </div>

        <div id="completedContainer" style="display: none;">
            <div class="completed-box">
                <h2>✅ Gratuluji!</h2>
                <p>Úspěšně jsi prošel všech 100 slov!</p>
                <p style="font-size: 28px; color: #667eea; font-weight: bold; margin: 20px 0;" id="finalScore">0%</p>
                <button class="btn-restart" id="restartBtn">Začít znovu</button>
            </div>
        </div>
    </div>

    <script>
        // 100 nejčastěji používaných anglických slov a jejich překladů
        const words = [
            { en: "the", cs: "ten/ta/to" },
            { en: "be", cs: "být" },
            { en: "to", cs: "k/na" },
            { en: "of", cs: "z/ze" },
            { en: "and", cs: "a" },
            { en: "a", cs: "jeden/jedna/jedno" },
            { en: "in", cs: "v/ve" },
            { en: "that", cs: "ten/ta/to" },
            { en: "have", cs: "mít" },
            { en: "I", cs: "já" },
            { en: "it", cs: "to/ono" },
            { en: "for", cs: "pro" },
            { en: "not", cs: "ne/není" },
            { en: "on", cs: "na" },
            { en: "with", cs: "s/se" },
            { en: "he", cs: "on" },
            { en: "as", cs: "jako/zatímco" },
            { en: "you", cs: "ty/vy" },
            { en: "do", cs: "dělat" },
            { en: "at", cs: "u/při" },
            { en: "this", cs: "tento/tato/toto" },
            { en: "but", cs: "ale" },
            { en: "his", cs: "jeho" },
            { en: "by", cs: "od/podle" },
            { en: "from", cs: "od/z" },
            { en: "they", cs: "oni/ony" },
            { en: "we", cs: "my" },
            { en: "say", cs: "říkat" },
            { en: "her", cs: "její/ji" },
            { en: "she", cs: "ona" },
            { en: "or", cs: "nebo" },
            { en: "an", cs: "jeden/jedna" },
            { en: "will", cs: "bude" },
            { en: "my", cs: "můj/má/mé" },
            { en: "one", cs: "jeden" },
            { en: "all", cs: "všichni/všechny" },
            { en: "would", cs: "by" },
            { en: "there", cs: "tam/zde" },
            { en: "their", cs: "jejich" },
            { en: "what", cs: "co/jaký" },
            { en: "so", cs: "tak/takže" },
            { en: "up", cs: "nahoru" },
            { en: "out", cs: "ven" },
            { en: "if", cs: "jestli/když" },
            { en: "about", cs: "o" },
            { en: "can", cs: "mohu/může" },
            { en: "which", cs: "který/která/které" },
            { en: "me", cs: "mě/mně" },
            { en: "some", cs: "nějaký/některý" },
            { en: "these", cs: "tito/tyto" },
            { en: "time", cs: "čas" },
            { en: "very", cs: "velmi" },
            { en: "when", cs: "když" },
            { en: "come", cs: "přijít" },
            { en: "here", cs: "zde/tady" },
            { en: "just", cs: "právě/jen" },
            { en: "like", cs: "jako/líbit se" },
            { en: "our", cs: "náš/naše" },
            { en: "people", cs: "lidé" },
            { en: "could", cs: "mohl" },
            { en: "them", cs: "je/jim" },
            { en: "him", cs: "jej/mu" },
            { en: "see", cs: "vidět" },
            { en: "now", cs: "teď/nyní" },
            { en: "than", cs: "než" },
            { en: "other", cs: "jiný" },
            { en: "then", cs: "potom" },
            { en: "look", cs: "podívat se" },
            { en: "only", cs: "jen/pouze" },
            { en: "make", cs: "dělat" },
            { en: "more", cs: "více/víc" },
            { en: "over", cs: "nad" },
            { en: "such", cs: "takový" },
            { en: "who", cs: "kdo" },
            { en: "year", cs: "rok" },
            { en: "work", cs: "práce/pracovat" },
            { en: "first", cs: "první" },
            { en: "way", cs: "cesta/způsob" },
            { en: "day", cs: "den" },
            { en: "man", cs: "muž" },
            { en: "where", cs: "kde" },
            { en: "think", cs: "myslet" },
            { en: "place", cs: "místo" },
            { en: "after", cs: "po" },
            { en: "get", cs: "dostat" },
            { en: "go", cs: "jít" },
            { en: "year", cs: "rok" },
            { en: "through", cs: "skrz/přes" },
            { en: "because", cs: "protože" },
            { en: "may", cs: "smět/může" },
            { en: "system", cs: "systém" },
            { en: "say", cs: "říkat" },
            { en: "water", cs: "voda" },
            { en: "well", cs: "dobře" },
            { en: "take", cs: "brát" },
            { en: "life", cs: "život" },
            { en: "use", cs: "použít" },
            { en: "try", cs: "zkusit" },
            { en: "good", cs: "dobrý" }
        ];

        let currentIndex = 0;
        let correct = 0;
        let shuffledWords = [];
        let timeRemaining = 180; // 3 minutes in seconds
        let timerInterval = null;
        let quizEnded = false;

        function initializeQuiz() {
            shuffledWords = [...words].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            correct = 0;
            timeRemaining = 180;
            quizEnded = false;
            
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
            
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('completedContainer').style.display = 'none';
            updateUI();
            loadQuestion();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    endQuizByTimeout();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            const display = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            const timerEl = document.getElementById('timerValue');
            timerEl.textContent = display;
            
            timerEl.className = 'timer-value';
            if (timeRemaining <= 30 && timeRemaining > 10) {
                timerEl.className = 'timer-value warning';
            } else if (timeRemaining <= 10) {
                timerEl.className = 'timer-value critical';
            }
        }

        function endQuizByTimeout() {
            quizEnded = true;
            document.getElementById('quizContainer').style.display = 'none';
            showTimeoutCompletion();
        }

        function showTimeoutCompletion() {
            document.getElementById('completedContainer').style.display = 'block';
            const finalPercentage = Math.round((correct / (currentIndex || 1)) * 100);
            document.getElementById('finalScore').innerHTML = `
                <div style="font-size: 16px; margin-bottom: 10px; color: #f44336;">⏰ Čas vypršel!</div>
                <div>${finalPercentage}%</div>
                <div style="font-size: 14px; margin-top: 10px; color: #666;">Zvládl jsi ${currentIndex} z 100 slov</div>
            `;
        }

        function loadQuestion() {
            if (currentIndex >= shuffledWords.length) {
                showCompletion();
                return;
            }

            const word = shuffledWords[currentIndex];
            document.getElementById('englishWord').textContent = word.en;
            document.getElementById('answerInput').value = '';
            document.getElementById('result').textContent = '';
            document.getElementById('result').className = 'result';
            document.getElementById('answerDisplay').textContent = '';
            document.getElementById('answerDisplay').className = 'answer-display';
            document.getElementById('answerInput').focus();
            updateUI();
        }

        function normalizeText(text) {
            return text.toLowerCase().trim();
        }

        function checkAnswer() {
            if (quizEnded) return;
            
            const answer = document.getElementById('answerInput').value;
            const currentWord = shuffledWords[currentIndex];
            
            const userAnswer = normalizeText(answer);
            const correctAnswers = currentWord.cs.split('/').map(a => normalizeText(a));
            
            const isCorrect = correctAnswers.some(a => userAnswer === a);
            
            const resultEl = document.getElementById('result');
            if (isCorrect) {
                resultEl.textContent = '✅ Správně!';
                resultEl.className = 'result correct';
                correct++;
            } else {
                resultEl.textContent = '❌ Špatně!';
                resultEl.className = 'result incorrect';
                document.getElementById('answerDisplay').textContent = `Správná odpověď: ${currentWord.cs}`;
                document.getElementById('answerDisplay').className = 'answer-display show';
            }
            
            updateUI();
            setTimeout(nextQuestion, 1500);
        }

        function skipQuestion() {
            if (quizEnded) return;
            
            const currentWord = shuffledWords[currentIndex];
            document.getElementById('answerDisplay').textContent = `Přeskočeno! Odpověď: ${currentWord.cs}`;
            document.getElementById('answerDisplay').className = 'answer-display show';
            setTimeout(nextQuestion, 1500);
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function updateUI() {
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('remainingCount').textContent = shuffledWords.length - currentIndex;
            const percentage = Math.round((correct / (currentIndex || 1)) * 100);
            document.getElementById('scoreCount').textContent = percentage + '%';
            
            const progress = (currentIndex / shuffledWords.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showCompletion() {
            quizEnded = true;
            if (timerInterval) clearInterval(timerInterval);
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('completedContainer').style.display = 'block';
            const finalPercentage = Math.round((correct / shuffledWords.length) * 100);
            document.getElementById('finalScore').innerHTML = `
                <div>${finalPercentage}%</div>
                <div style="font-size: 14px; margin-top: 10px; color: #666;">Zvládl jsi všech 100 slov!</div>
            `;
        }

        // Event listeners
        document.getElementById('checkBtn').addEventListener('click', checkAnswer);
        document.getElementById('skipBtn').addEventListener('click', skipQuestion);
        document.getElementById('answerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
        document.getElementById('restartBtn').addEventListener('click', initializeQuiz);

        // Start quiz
        initializeQuiz();
    </script>
</body>
</html>
