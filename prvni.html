<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOJE ČS55</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6b6b, #c1121f);
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 600px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2.5rem;
      color: #4a4a4a;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #b00020;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      transition: 0.3s;
    }

    .button:hover {
      background: #7f0015;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MOJE ČS</h1>
    <p>
      Tohle je moje první hezká HTML stránka vytvořená na GitHubu.
      Můžu sem přidat text, obrázky, odkazy i další obsah.
    </p>
    <a class="button" href="#">Zjistit více</a>
  </div>
</body>
</html>
